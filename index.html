<!DOCTYPE html>
<html lang="ku" dir="rtl" id="html-root">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartServe — مێنیوی دیجیتاڵ</title>
    <link rel="icon" type="image/png" href="images/icon-192.png">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0C0A1B">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SmartServe">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--gold:#6366F1;--gold2:#8B5CF6;--bg:#0C0A1B;--card:#16132C;--card2:#1E1A3C;--text:#EDEBFB;--sub:#938CC2;--line:rgba(139,92,246,.20);--wa:#25D366}
        html{scroll-behavior:smooth}
        body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--text);line-height:1.8;overflow-x:hidden}
        a{text-decoration:none;color:inherit}
        .g{color:var(--gold)}
        .wrap{max-width:1080px;margin:0 auto;padding:0 20px}
        .glow{position:fixed;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.20),transparent 70%);filter:blur(24px);z-index:0;pointer-events:none}
        .glow.a{top:-160px;inset-inline-end:-120px}.glow.b{bottom:-180px;inset-inline-start:-120px}

        /* HEADER */
        header{position:sticky;top:0;z-index:50;background:rgba(20,11,0,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
        .nav{display:flex;align-items:center;justify-content:space-between;height:64px;gap:12px}
        .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;letter-spacing:.2px;white-space:nowrap}
        .brand .mk{font-size:26px}
        .brand .brand-logo{width:38px;height:38px;border-radius:10px;object-fit:cover;display:block;animation:logoFloat 3.2s ease-in-out infinite}
        @keyframes logoFloat{0%,100%{transform:translateY(0) rotate(0);filter:drop-shadow(0 0 6px rgba(99,102,241,.55))}50%{transform:translateY(-3px) rotate(-1.5deg);filter:drop-shadow(0 0 16px rgba(139,92,246,.95))}}
        .brand .bt{display:inline-flex;align-items:center;gap:0;color:var(--text);min-width:8em}
        .brand .brand-tw{display:inline-block;border-inline-end:2px solid transparent;padding-inline-end:1px}
        .brand .brand-tw.typing{border-inline-end-color:var(--gold);animation:brandCaret .7s step-end infinite}
        @keyframes brandCaret{50%{border-color:transparent}}
        .brand .brand-sep{color:var(--gold);font-weight:800;font-size:.95em;padding-inline-start:5px;animation:sepPulse 1.5s ease-in-out infinite}
        @keyframes sepPulse{0%,100%{opacity:.5;text-shadow:0 0 6px rgba(99,102,241,.35)}50%{opacity:1;text-shadow:0 0 14px rgba(139,92,246,.85);transform:scale(1.08)}}
        .brand .g{background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;padding-inline-start:1px;font-weight:900}
        .menu{display:flex;align-items:center;gap:18px}
        .menu a.navlink{font-size:14px;color:var(--sub);font-weight:600;transition:color .2s}
        .menu a.navlink:hover{color:var(--text)}
        .lang-sw{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:50px;padding:3px}
        .lang-btn{background:none;border:none;color:var(--sub);font-family:inherit;font-size:12px;font-weight:700;padding:6px 11px;border-radius:50px;cursor:pointer;transition:all .2s}
        .lang-btn.on{background:var(--gold);color:#fff}
        .dash-btn{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#fff!important;font-size:13px;font-weight:800;padding:8px 16px;border-radius:50px;white-space:nowrap;box-shadow:0 6px 18px rgba(139,92,246,.35);transition:transform .2s}
        .dash-btn:hover{transform:translateY(-2px)}
        .login-link{border:1px solid var(--line);padding:8px 15px;border-radius:50px;color:var(--text)!important;font-size:13px;white-space:nowrap}
        .login-link:hover{border-color:var(--gold);background:var(--card)}

        /* HERO */
        .hero{position:relative;z-index:1;text-align:center;padding:78px 0 64px}
        .pill{display:inline-block;background:var(--card);border:1px solid var(--line);color:var(--gold);font-size:12.5px;font-weight:700;padding:7px 16px;border-radius:50px;margin-bottom:22px}
        .hero h1{font-size:46px;font-weight:900;letter-spacing:.3px;line-height:1.3;margin-bottom:16px}
        .hero p{font-size:17px;color:var(--sub);max-width:620px;margin:0 auto 30px}
        .cta{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#fff;font-size:16px;font-weight:800;padding:16px 30px;border-radius:14px;box-shadow:0 10px 30px rgba(139,92,246,.45);transition:transform .2s,box-shadow .2s}
        .cta:hover{transform:translateY(-3px);box-shadow:0 14px 38px rgba(139,92,246,.6)}
        .hero .note{margin-top:14px;font-size:13px;color:var(--sub)}

        /* SECTIONS */
        section{position:relative;z-index:1;padding:60px 0}
        .stitle{text-align:center;margin-bottom:42px}
        .stitle h2{font-size:30px;font-weight:800}
        .stitle p{color:var(--sub);font-size:15px;margin-top:8px}

        .feats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
        .feat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px 18px;text-align:center;transition:transform .2s,border-color .2s}
        .feat:hover{transform:translateY(-4px);border-color:var(--gold)}
        .feat .fi{font-size:34px;margin-bottom:12px}
        .feat h3{font-size:15px;font-weight:800;margin-bottom:7px}
        .feat p{font-size:12.5px;color:var(--sub);line-height:1.8}

        .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
        .step{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:18px;padding:28px 22px;text-align:center}
        .step .num{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#fff;font-weight:900;font-size:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
        .step h3{font-size:16px;font-weight:800;margin-bottom:8px}
        .step p{font-size:13px;color:var(--sub)}

        /* STATS BAND */
        .statsband{background:linear-gradient(135deg,var(--card2),var(--card));border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:40px 0}
        .statsrow{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;text-align:center}
        .statbox .sn{font-size:38px;font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
        .statbox .sl{margin-top:8px;color:var(--sub);font-size:13.5px;font-weight:600}

        /* CUSTOMERS */
        .custs{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
        .cust{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;text-align:center;transition:transform .2s,border-color .2s}
        .cust:hover{transform:translateY(-4px);border-color:var(--gold)}
        .cust .lg{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--gold2),var(--gold));display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 10px;overflow:hidden}
        .cust .lg img{width:100%;height:100%;object-fit:cover}
        .cust .cn{font-weight:800;font-size:15px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .cust .cadr{font-size:11.5px;color:var(--sub);margin-bottom:12px;min-height:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .cust .qrbox{width:124px;height:124px;margin:0 auto 12px;background:#fff;border-radius:12px;padding:6px;display:flex;align-items:center;justify-content:center}
        .cust .qrbox canvas,.cust .qrbox svg{width:112px!important;height:112px!important}
        .cust .vm{display:inline-block;font-size:12.5px;font-weight:700;color:var(--gold);border:1px solid var(--line);border-radius:9px;padding:7px 18px;transition:all .2s}
        .cust .vm:hover{border-color:var(--gold);background:var(--card2)}
        .cust.extra{display:none}
        .cust.extra.show{display:block}
        .morewrap{text-align:center;margin-top:34px}
        .morebtn{background:var(--card);border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:14px;font-weight:700;padding:12px 28px;border-radius:50px;cursor:pointer;transition:border-color .2s}
        .morebtn:hover{border-color:var(--gold)}

        /* FEATURED CLIENT */
        .client-feature{display:flex;align-items:center;gap:28px;max-width:760px;margin:0 auto;background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:22px;padding:28px 32px;box-shadow:0 18px 50px rgba(139,92,246,.16)}
        .cf-logo{flex:none;width:78px;height:78px;border-radius:20px;overflow:hidden;background:transparent;box-shadow:0 8px 22px rgba(0,0,0,.35)}
        .cf-logo img{width:100%;height:100%;object-fit:cover;display:block;transform:scale(1.04)}
        .cf-info{flex:1;text-align:start}
        .cf-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(37,211,102,.12);color:var(--wa);font-size:11.5px;font-weight:800;letter-spacing:.5px;padding:5px 12px;border-radius:50px;margin-bottom:10px}
        .cf-dot{width:8px;height:8px;border-radius:50%;background:var(--wa);box-shadow:0 0 0 0 rgba(37,211,102,.6);animation:cfpulse 1.8s infinite}
        @keyframes cfpulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,.55)}70%{box-shadow:0 0 0 9px rgba(37,211,102,0)}100%{box-shadow:0 0 0 0 rgba(37,211,102,0)}}
        .cf-name{font-size:22px;font-weight:900;margin-bottom:4px}
        .cf-desc{font-size:13.5px;color:var(--sub);margin-bottom:16px}
        .cf-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#fff;font-size:14px;font-weight:800;padding:11px 22px;border-radius:12px;box-shadow:0 8px 22px rgba(139,92,246,.4);transition:transform .2s}
        .cf-btn:hover{transform:translateY(-2px)}
        .cf-qr{flex:none}
        .cf-qr .qrbox{width:128px;height:128px;background:#fff;border-radius:14px;padding:8px;display:flex;align-items:center;justify-content:center}
        .cf-qr .qrbox canvas,.cf-qr .qrbox svg{width:112px!important;height:112px!important}

        /* DESIGN STYLES GALLERY */
        .gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
        .gcard{margin:0;border:1px solid var(--line);border-radius:20px;overflow:hidden;background:var(--card);transition:transform .25s,border-color .25s,box-shadow .25s}
        .gcard:hover{transform:translateY(-5px);border-color:var(--gold);box-shadow:0 16px 40px rgba(139,92,246,.22)}
        .gcard img{display:block;width:100%;height:auto;transition:transform .4s}
        .gcard:hover img{transform:scale(1.03)}
        @media(max-width:760px){
            .client-feature{flex-direction:column;text-align:center;padding:26px 20px;gap:18px}
            .cf-info{text-align:center}
            .gallery{grid-template-columns:1fr}
        }

        /* PRICING */
        .plan{max-width:440px;margin:0 auto;background:linear-gradient(160deg,var(--card2),var(--card));border:1.5px solid var(--gold);border-radius:24px;padding:38px 30px 32px;text-align:center;box-shadow:0 18px 50px rgba(139,92,246,.22);position:relative}
        .plan .pbadge{position:absolute;top:-14px;inset-inline-start:0;inset-inline-end:0;margin:0 auto;width:fit-content;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#fff;font-size:12px;font-weight:800;padding:6px 18px;border-radius:50px}
        .plan .pn{font-size:16px;font-weight:700;color:var(--sub);margin-bottom:12px}
        .plan .pp{font-size:54px;font-weight:900;line-height:1}
        .plan .pp small{font-size:17px;color:var(--sub);font-weight:700}
        .plan .pr{color:var(--gold);font-weight:800;margin:12px 0 4px;font-size:15px}
        .plan .pnote{color:var(--sub);font-size:12.5px;margin-bottom:24px}
        .plan ul{list-style:none;text-align:start;margin:0 0 26px}
        .plan li{padding:9px 2px;border-bottom:1px solid var(--line);font-size:14px;display:flex;gap:10px;align-items:center}
        .plan li::before{content:"✓";color:var(--gold);font-weight:900}
        .plan .pcta{display:flex;width:100%;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#fff;font-weight:800;font-size:16px;padding:15px;border-radius:14px;box-shadow:0 10px 26px rgba(139,92,246,.4);transition:transform .2s}
        .plan .pcta:hover{transform:translateY(-2px)}
        @media(max-width:820px){.statsrow{grid-template-columns:repeat(2,1fr)}.custs{grid-template-columns:repeat(2,1fr)}}
        @media(max-width:600px){.custs{grid-template-columns:1fr}.statbox .sn{font-size:30px}}

        /* FORM */
        .formsec{background:linear-gradient(180deg,transparent,rgba(201,168,76,.05))}
        .formcard{max-width:560px;margin:0 auto;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:34px}
        .fg{margin-bottom:16px}
        .fg label{display:block;font-size:13px;font-weight:700;color:var(--sub);margin-bottom:7px;text-align:start}
        .fg label b{color:var(--gold)}
        .fg input,.fg textarea{width:100%;background:var(--bg);border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s;text-align:start;direction:inherit}
        .fg input:focus,.fg textarea:focus{border-color:var(--gold)}
        .fg textarea{resize:vertical;min-height:80px}
        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .send{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--wa);color:#fff;font-size:16px;font-weight:800;border:none;border-radius:14px;padding:16px;cursor:pointer;font-family:inherit;transition:transform .2s,filter .2s}
        .send:hover{transform:translateY(-2px);filter:brightness(1.08)}
        .fmsg{text-align:center;font-size:13px;margin-top:12px;min-height:18px}
        .fmsg.err{color:#ff7a7a}.fmsg.ok{color:var(--wa)}

        /* FOOTER */
        footer{position:relative;z-index:1;border-top:1px solid var(--line);padding:30px 0;text-align:center;color:var(--sub);font-size:13px}
        .credit{margin-top:8px;font-size:12.5px}
        .credit a{color:var(--gold);font-weight:700}
        .credit a:hover{text-decoration:underline}
        .socials{margin-top:18px;display:inline-flex;align-items:center;gap:14px}
        .socials a{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;color:#fff;transition:transform .2s,box-shadow .2s}
        .socials a:hover{transform:translateY(-2px)}
        .socials .s-insta{background:linear-gradient(135deg,#f09433,#dc2743,#bc1888)}
        .socials .s-insta:hover{box-shadow:0 8px 24px rgba(220,39,67,.45)}
        .socials .s-face{background:#1877f2}
        .socials .s-face:hover{box-shadow:0 8px 24px rgba(24,119,242,.45)}
        .socials .s-tiktok{background:#000}
        .socials .s-tiktok:hover{box-shadow:0 8px 24px rgba(0,0,0,.6)}
        .socials svg{width:20px;height:20px;fill:currentColor}

        @media(max-width:820px){.feats{grid-template-columns:repeat(2,1fr)}.steps{grid-template-columns:1fr}}
        @media(max-width:600px){.menu .navlink{display:none}.hero h1{font-size:32px}.hero p{font-size:15px}.stitle h2{font-size:24px}.grid2{grid-template-columns:1fr}.hero{padding:52px 0 44px}}
    </style>
</head>
<body>
    <div class="glow a"></div>
    <div class="glow b"></div>

    <header>
        <div class="wrap nav">
            <a class="brand" href="#top"><img class="brand-logo" src="images/logo.png" alt="SmartServe logo"> <span class="bt"><span class="brand-tw"></span><span class="brand-sep">|</span></span></a>
            <nav class="menu">
                <a class="navlink" href="#features" data-i18n="lnd_nav_features"></a>
                <a class="navlink" href="#how" data-i18n="lnd_nav_how"></a>
                <a class="navlink" href="#customers" data-i18n="lnd_nav_work"></a>
                <a class="navlink" href="#pricing" data-i18n="lnd_nav_pricing"></a>
                <div class="lang-sw">
                    <button class="lang-btn" data-l="ku" onclick="setLang('ku')">کوردی</button>
                    <button class="lang-btn" data-l="ar" onclick="setLang('ar')">عربي</button>
                    <button class="lang-btn" data-l="en" onclick="setLang('en')">EN</button>
                </div>
            </nav>
        </div>
    </header>

    <div id="top"></div>

    <!-- HERO -->
    <div class="hero wrap">
        <span class="pill" data-i18n="lnd_hero_pill"></span>
        <h1 data-i18n="lnd_hero_h1"></h1>
        <p data-i18n="lnd_hero_p"></p>
        <a class="cta" href="#form" data-i18n="lnd_cta"></a>
        <div class="note" data-i18n="lnd_note"></div>
    </div>

    <!-- STATS -->
    <section class="statsband" id="stats">
        <div class="wrap">
            <div class="statsrow">
                <div class="statbox"><div class="sn" data-count="7">0</div><div class="sl" data-i18n="lnd_stat_rest"></div></div>
                <div class="statbox"><div class="sn" data-count="391">0</div><div class="sl" data-i18n="lnd_stat_items"></div></div>
                <div class="statbox"><div class="sn" data-count="619">0</div><div class="sl" data-i18n="lnd_stat_scans"></div></div>
                <div class="statbox"><div class="sn" data-count="9">0</div><div class="sl" data-i18n="lnd_stat_ratings"></div></div>
            </div>
        </div>
    </section>

    <!-- FEATURES -->
    <section id="features">
        <div class="wrap">
            <div class="stitle">
                <h2 data-i18n="lnd_feat_title"></h2>
                <p data-i18n="lnd_feat_sub"></p>
            </div>
            <div class="feats">
                <div class="feat"><div class="fi">📱</div><h3 data-i18n="lnd_f_qr_t"></h3><p data-i18n="lnd_f_qr_d"></p></div>
                <div class="feat"><div class="fi">🌐</div><h3 data-i18n="lnd_f_multi_t"></h3><p data-i18n="lnd_f_multi_d"></p></div>
                <div class="feat"><div class="fi">🎨</div><h3 data-i18n="lnd_f_theme_t"></h3><p data-i18n="lnd_f_theme_d"></p></div>
                <div class="feat"><div class="fi">🛒</div><h3 data-i18n="lnd_f_cart_t"></h3><p data-i18n="lnd_f_cart_d"></p></div>
                <div class="feat"><div class="fi">🍔</div><h3 data-i18n="lnd_f_menu_t"></h3><p data-i18n="lnd_f_menu_d"></p></div>
                <div class="feat"><div class="fi">📊</div><h3 data-i18n="lnd_f_anal_t"></h3><p data-i18n="lnd_f_anal_d"></p></div>
                <div class="feat"><div class="fi">⭐</div><h3 data-i18n="lnd_f_rate_t"></h3><p data-i18n="lnd_f_rate_d"></p></div>
                <div class="feat"><div class="fi">⚡</div><h3 data-i18n="lnd_f_speed_t"></h3><p data-i18n="lnd_f_speed_d"></p></div>
                <div class="feat"><div class="fi">🔗</div><h3 data-i18n="lnd_f_social_t"></h3><p data-i18n="lnd_f_social_d"></p></div>
                <div class="feat"><div class="fi">📍</div><h3 data-i18n="lnd_f_map_t"></h3><p data-i18n="lnd_f_map_d"></p></div>
                <div class="feat"><div class="fi">💰</div><h3 data-i18n="lnd_f_income_t"></h3><p data-i18n="lnd_f_income_d"></p></div>
                <div class="feat"><div class="fi">🔄</div><h3 data-i18n="lnd_f_sales_t"></h3><p data-i18n="lnd_f_sales_d"></p></div>
                <div class="feat"><div class="fi">🧾</div><h3 data-i18n="lnd_f_expense_t"></h3><p data-i18n="lnd_f_expense_d"></p></div>
                <div class="feat"><div class="fi">📈</div><h3 data-i18n="lnd_f_profit_t"></h3><p data-i18n="lnd_f_profit_d"></p></div>
            </div>
        </div>
    </section>

    <!-- HOW IT WORKS -->
    <section id="how">
        <div class="wrap">
            <div class="stitle">
                <h2 data-i18n="lnd_how_title"></h2>
                <p data-i18n="lnd_how_sub"></p>
            </div>
            <div class="steps">

    <script src="js/qr-code-styling.js"></script>

    <script>
        // ⚠ ژمارەی واتساپی خۆت لێرە دابنێ (کۆدی وڵات + ژمارە، بێ + و بێ بۆشایی)
        const WA_NUMBER = '9647506454656';

        function sendWa(){
            const v = id => (document.getElementById(id).value || '').trim();
            const rest = v('f-rest'), name = v('f-name'), phone = v('f-phone'), city = v('f-city'), note = v('f-note');
            const msg = document.getElementById('fmsg');
            if (!rest || !phone){ msg.className = 'fmsg err'; msg.textContent = t('lnd_form_err'); return; }
            const bar = '\u{2501}'.repeat(18);
            const p2 = n => String(n).padStart(2, '0');
            const now = new Date();
            const stamp = p2(now.getDate()) + '/' + p2(now.getMonth() + 1) + '/' + now.getFullYear() + ' - ' + p2(now.getHours()) + ':' + p2(now.getMinutes());
            const lines = [
                '*SmartServe*',
                t('lnd_wa_req'),
                bar,
                '*' + t('lnd_wa_place') + ':* ' + rest,
                '*' + t('lnd_wa_name') + ':* ' + (name || '-'),
                '*' + t('lnd_wa_phone') + ':* ' + phone,
                '*' + t('lnd_wa_city') + ':* ' + (city || '-')
            ];
            if (note) lines.push('*' + t('lnd_wa_note') + ':* ' + note);
            lines.push('*' + t('lnd_wa_time') + ':* ' + stamp);
            lines.push(bar);
            lines.push('Smart-Serve | ' + t('lnd_wa_footer'));
            msg.className = 'fmsg ok'; msg.textContent = t('lnd_form_ok');
            window.open('https://wa.me/' + WA_NUMBER + '?text=' + encodeURIComponent(lines.join('\n')), '_blank');
        }

        // زمان لە i18n.js کۆنترۆڵ دەکرێت — لێرە تەنها جاری دەکەینەوە (متن + جهت)
        window.I18N.setLang(window.I18N.getLang());

        // ── QR codes for customer showcase ──
        (function(){
            if (typeof QRCodeStyling === 'undefined') return;
            const origin = window.location.origin;
            document.querySelectorAll('.qrbox[data-qr]').forEach(function(box){
                const url = box.getAttribute('data-qr');
                if (!url) return;
                try {
                    new QRCodeStyling({
                        width: 112, height: 112, margin: 0,
                        data: url,
                        dotsOptions: { type: 'rounded', color: '#1E1A3C' },
                        cornersSquareOptions: { type: 'extra-rounded', color: '#6366F1' },
                        backgroundOptions: { color: '#ffffff' }
                    }).append(box);
                } catch (e) {}
            });
        })();

        // ── animated counters ──
        function lndCount(el){
            const target = parseInt(el.getAttribute('data-count')) || 0;
            let cur = 0; const step = Math.max(1, target / 55);
            const tm = setInterval(function(){ cur += step; if (cur >= target){ cur = target; clearInterval(tm); } el.textContent = Math.floor(cur).toLocaleString('en-US'); }, 22);
        }
        const lndStats = document.getElementById('stats');
        if (lndStats && 'IntersectionObserver' in window){
            const io = new IntersectionObserver(function(es){ es.forEach(function(e){ if (e.isIntersecting){ e.target.querySelectorAll('.sn[data-count]').forEach(lndCount); io.unobserve(e.target); } }); }, { threshold: .3 });
            io.observe(lndStats);
        } else if (lndStats){
            lndStats.querySelectorAll('.sn[data-count]').forEach(lndCount);
        }

        // ── show all customers ──
        function showAllCusts(){
            document.querySelectorAll('.cust.extra').forEach(function(e){ e.classList.add('show'); });
            const b = document.getElementById('custMore'); if (b) b.style.display = 'none';
        }

        // ── per-customer language (name/address switch with the page language) ──
        function applyCustLang(){
            const l = (window.I18N && window.I18N.getLang) ? window.I18N.getLang() : 'ku';
            document.querySelectorAll('.cust .ml').forEach(function(el){
                el.textContent = el.getAttribute('data-' + l) || el.getAttribute('data-ku') || el.getAttribute('data-en') || '';
            });
        }
        document.addEventListener('langchange', applyCustLang);
        applyCustLang();

        // ── brand title: ku ↔ en typewriter; | stays at end ──
        (function(){
            var ORDER = ['ku', 'en'];
            var idx = 0;
            function brandTypewriter(){
                var word = document.querySelector('.brand .brand-tw');
                var STR = window.I18N && window.I18N.STR;
                if (!word || !STR || !STR.lnd_brand) return;
                clearInterval(word._tw);
                clearTimeout(word._twPause);
                word._twActive = true;
                function plain(html){ var s = document.createElement('span'); s.innerHTML = html; return s.textContent || ''; }
                function typeOne(lang, done){
                    if (!word._twActive) return;
                    var html = STR.lnd_brand[lang] || '';
                    var text = plain(html);
                    word.textContent = '';
                    word.classList.add('typing');
                    var i = 0;
                    word._tw = setInterval(function(){
                        word.textContent = text.slice(0, ++i);
                        if (i >= text.length){
                            clearInterval(word._tw);
                            word.classList.remove('typing');
                            word.innerHTML = html;
                            word._twPause = setTimeout(function(){
                                if (!word._twActive) return;
                                word.textContent = '';
                                word.classList.add('typing');
                                var j = text.length;
                                word._tw = setInterval(function(){
                                    word.textContent = text.slice(0, --j);
                                    if (j <= 0){ clearInterval(word._tw); word.classList.remove('typing'); done(); }
                                }, 38);
                            }, 2200);
                        }
                    }, 88);
                }
                function cycle(){
                    if (!word._twActive) return;
                    typeOne(ORDER[idx], function(){
                        idx = (idx + 1) % ORDER.length;
                        word._twPause = setTimeout(cycle, 500);
                    });
                }
                cycle();
            }
            brandTypewriter();
        })();
    </script>
